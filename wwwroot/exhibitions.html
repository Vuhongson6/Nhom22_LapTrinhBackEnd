<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triển lãm - Museum Artifact Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-header">
      <h2>🏛️ Museum</h2>
      <p>Artifact Manager</p>
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a></li>
      <li><a href="artifacts.html"><span class="icon">🏺</span><span>Hiện vật</span></a></li>
      <li><a href="exhibitions.html" class="active"><span class="icon">🖼️</span><span>Triển lãm</span></a></li>
      <li><a href="staff.html"><span class="icon">👤</span><span>Nhân viên</span></a></li>
      <li><a href="restorations.html"><span class="icon">🔧</span><span>Phục chế</span></a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Quản lý Triển lãm</h1>
      <p>Danh sách các triển lãm</p>
    </div>

    <div class="data-table-wrapper">
      <div class="table-toolbar">
        <h3>Triển lãm</h3>
        <button class="btn btn-primary" onclick="openAddModal()">+ Thêm mới</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Mô tả</th>
            <th>Ngày bắt đầu</th>
            <th>Ngày kết thúc</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="data-body">
          <tr class="loading-row"><td colspan="6">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Thêm triển lãm</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label>Tên triển lãm</label>
          <input type="text" id="form-name">
        </div>
        <div class="form-group">
          <label>Mô tả</label>
          <textarea id="form-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Ngày bắt đầu</label>
          <input type="text" id="form-startDate" placeholder="VD: 2024-01-15">
        </div>
        <div class="form-group">
          <label>Ngày kết thúc</label>
          <input type="text" id="form-endDate" placeholder="VD: 2024-06-30">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveItem()">Lưu</button>
      </div>
    </div>
  </div>

  <script src="js/exhibition.js"></script>
</body>
</html>
