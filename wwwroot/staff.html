<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhân viên - Museum Artifact Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-header">
      <h2>🏛️ Museum</h2>
      <p>Artifact Manager</p>
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a></li>
      <li><a href="artifacts.html"><span class="icon">🏺</span><span>Hiện vật</span></a></li>
      <li><a href="exhibitions.html"><span class="icon">🖼️</span><span>Triển lãm</span></a></li>
      <li><a href="staff.html" class="active"><span class="icon">👤</span><span>Nhân viên</span></a></li>
      <li><a href="restorations.html"><span class="icon">🔧</span><span>Phục chế</span></a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Quản lý Nhân viên</h1>
      <p>Danh sách nhân viên bảo tàng</p>
    </div>

    <div class="data-table-wrapper">
      <div class="table-toolbar">
        <h3>Nhân viên</h3>
        <button class="btn btn-primary" onclick="openAddModal()">+ Thêm mới</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Chức vụ</th>
            <th>Điện thoại</th>
            <th>Email</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="data-body">
          <tr class="loading-row"><td colspan="6">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Thêm nhân viên</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label>Tên nhân viên</label>
          <input type="text" id="form-name">
        </div>
        <div class="form-group">
          <label>Chức vụ</label>
          <input type="text" id="form-position">
        </div>
        <div class="form-group">
          <label>Điện thoại</label>
          <input type="text" id="form-phone">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="form-email">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveItem()">Lưu</button>
      </div>
    </div>
  </div>

  <script src="js/staff.js"></script>
</body>
</html>
